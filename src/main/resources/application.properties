spring.application.name=baiducloud-java-sdk
server.port=8080

# 日志
logging.console_enabled=true
logging.file.name=logs/baiducloud-java-sdk.log
logging.log_level=INFO

# redis配置
# spring.redis.host=
# spring.redis.port=
# spring.redis.password=
# spring.redis.timeout=1000ms
# spring.redis.database=8
# spring.redis.lettuce.pool.min-idle=0
# spring.redis.lettuce.pool.max-idle=8
# spring.redis.lettuce.pool.max-wait=-1ms
# spring.redis.lettuce.pool.max-active=8

# spring缓存配置
# spring.cache.type=redis
# spring.cache.redis.key-prefix=demo:
# spring.cache.redis.time-to-live=30s

# 数据库配置
spring.datasource.name=baiducloud-java-sdk
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://IP:PORT/DB_NAME?useUnicode=true&characterEncoding=UTF8&useSSL=false
spring.datasource.username=USERNAME
spring.datasource.password=PASSWORD
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=6000
spring.datasource.hikari.pool-name=demoPrimaryHikariCP
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=500
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# mybatis配置
# mybatis.mapper-locations=classpath:mapper/*Dao.xml
# mybatis.type-aliases-package=com.baidubce.baiducloudjavasdk.model
# mybatis.dao-packages=com.baidubce.baiducloudjavasdk.dao

# 内置数据度量配置
# 配置后可以集成至prometheus
metrics.prefix.white.list=jvm,hikaricp,http,jdbc,jetty,kafka,net,process,system,tomcat,logback
management.metrics.tags.application=${spring.application.name}

# 优雅停机
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
